version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - ollama
      - redis
    volumes:
      - ./backend:/app/backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A backend.tasks.processing worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - ollama

volumes:
  ollama_data:
